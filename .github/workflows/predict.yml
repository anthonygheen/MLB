name: K Prop Predictions

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to predict (YYYY-MM-DD). Defaults to today.'
        required: false
        type: string
      threshold:
        description: 'Edge threshold in Ks to flag a bet (default: 0.75)'
        required: false
        default: '0.75'
        type: string

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest today's games
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          DB_PATH: data/mlb_modeling.db
        run: |
          TARGET="${{ github.event.inputs.date }}"
          if [ -z "$TARGET" ]; then
            TARGET=$(date +%Y-%m-%d)
          fi
          python ingestion/schema.py
          python ingestion/ingest.py --date "$TARGET"

      - name: Pull today's props
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          DB_PATH: data/mlb_modeling.db
        run: |
          TARGET="${{ github.event.inputs.date }}"
          if [ -z "$TARGET" ]; then
            TARGET=$(date +%Y-%m-%d)
          fi
          python ingestion/ingest_props.py --date "$TARGET"

      - name: Run predictions
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          DB_PATH: data/mlb_modeling.db
        run: |
          TARGET="${{ github.event.inputs.date }}"
          THRESHOLD="${{ github.event.inputs.threshold }}"
          if [ -z "$TARGET" ]; then
            TARGET=$(date +%Y-%m-%d)
          fi
          python scripts/predict_today.py \
            --date "$TARGET" \
            --threshold "$THRESHOLD" \
            | tee predictions_output.txt

      - name: Upload predictions
        uses: actions/upload-artifact@v4
        with:
          name: predictions-${{ github.run_id }}
          path: predictions_output.txt
          retention-days: 30
