name: MLB Daily Pipeline

on:
  schedule:
    - cron: '0 20 * * *'  # 4 PM ET (20:00 UTC) — props posted, last night's games final
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date YYYY-MM-DD (default: today)'
        required: false
        type: string
      min_ev:
        description: 'Min EV per $100 risked (default: 3.0)'
        required: false
        default: '3.0'
        type: string
      skip_ingest:
        description: 'Skip game ingestion (if already run)'
        required: false
        type: boolean
        default: false
      sync_only:
        description: 'Only sync players + refresh dashboard (skip full pipeline)'
        required: false
        type: boolean
        default: false

jobs:
  daily:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit docs/data/ back to repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get today's date
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Restore DB from cache
        id: cache
        uses: actions/cache@v4
        with:
          path: data/mlb_modeling.db
          key: mlb-db-v3-${{ steps.date.outputs.today }}
          restore-keys: mlb-db-v3-

      - name: Seed DB (cache miss only)
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          echo "Cache miss — attempting to download DB from latest release..."
          gh release download --pattern "mlb_modeling.db" -D data/
          SIZE=$(stat -c%s data/mlb_modeling.db 2>/dev/null || echo 0)
          echo "Downloaded DB: ${SIZE} bytes"
          if [ "$SIZE" -lt 50000000 ]; then
            echo "ERROR: DB is only ${SIZE} bytes — release asset is missing or corrupt."
            echo "Create a release with: gh release create v1.0-db-seed data/mlb_modeling.db"
            exit 1
          fi
          echo "DB seed successful."

      - name: DB diagnostics
        env:
          DB_PATH: ${{ github.workspace }}/data/mlb_modeling.db
        run: |
          python - <<'EOF'
          import os, duckdb
          db = os.environ["DB_PATH"]
          size = os.path.getsize(db) if os.path.exists(db) else 0
          print(f"DB file: {db}")
          print(f"DB size: {size:,} bytes ({size//1024//1024} MB)")
          con = duckdb.connect(db, read_only=True)
          for t in ["games","plate_appearances","pitches","players","player_props","model_predictions"]:
              try:
                  n = con.execute(f"SELECT COUNT(*) FROM {t}").fetchone()[0]
                  print(f"  {t}: {n:,} rows")
              except Exception as e:
                  print(f"  {t}: ERROR - {e}")
          con.close()
          EOF

      - name: Sync players
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          DB_PATH: ${{ github.workspace }}/data/mlb_modeling.db
        run: python ingestion/sync_players.py

      - name: Run daily pipeline
        if: inputs.sync_only != true
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          DB_PATH: ${{ github.workspace }}/data/mlb_modeling.db
        run: |
          ARGS=""
          [ -n "${{ inputs.date }}" ]              && ARGS="$ARGS --date ${{ inputs.date }}"
          [ -n "${{ inputs.min_ev }}" ]            && ARGS="$ARGS --min-ev ${{ inputs.min_ev }}"
          [ "${{ inputs.skip_ingest }}" = "true" ] && ARGS="$ARGS --skip-ingest"
          python run_daily.py $ARGS

      - name: Refresh dashboard (sync_only mode)
        if: inputs.sync_only == true
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          DB_PATH: ${{ github.workspace }}/data/mlb_modeling.db
        run: python scripts/generate_data.py

      - name: Commit dashboard data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "Dashboard: ${{ steps.date.outputs.today }}"
          git push
