<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Foots Analytics Group | Strikeouts Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c12;--bg2:#0d1420;--bg3:#121b2e;
  --border:#1e2d45;--border2:#243552;
  --text:#c8d8f0;--dim:#5a7299;--muted:#3a5070;
  --accent:#00d4ff;--accent2:#0099cc;
  --green:#00e676;--green-dim:#00e67618;
  --red:#ff4444;--red-dim:#ff444418;
  --gold:#ffc107;
  --fh:'Bebas Neue',sans-serif;
  --fm:'DM Mono',monospace;
  --fb:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 2rem;display:flex;align-items:center;
  justify-content:space-between;height:60px;
  position:sticky;top:0;z-index:100;
}
.logo{font-family:var(--fh);font-size:1.7rem;letter-spacing:.08em;color:var(--accent)}
.logo span{color:var(--dim)}
.meta{font-family:var(--fm);font-size:.65rem;color:var(--dim);text-align:right;line-height:1.6}

.nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 2rem}
.tab{
  padding:.85rem 1.4rem;font-size:.72rem;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;color:var(--dim);
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all .15s;background:none;border-left:none;border-right:none;border-top:none;
  font-family:var(--fb);
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.main{padding:2rem;max-width:1400px;margin:0 auto;width:100%}
.panel{display:none}.panel.active{display:block}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:2rem}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:1.2rem 1.5rem}
.stat-label{font-size:.6rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.stat-val{font-family:var(--fm);font-size:1.75rem;font-weight:500;color:var(--text);line-height:1}
.stat-val.a{color:var(--accent)}.stat-val.g{color:var(--green)}.stat-val.r{color:var(--red)}.stat-val.gold{color:var(--gold)}

.filter-row{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.fbtn{
  padding:.3rem .85rem;border-radius:4px;border:1px solid var(--border);
  background:var(--bg3);color:var(--dim);font-size:.68rem;font-weight:600;
  letter-spacing:.08em;cursor:pointer;font-family:var(--fb);transition:all .15s;
}
.fbtn:hover{color:var(--text);border-color:var(--border2)}
.fbtn.active{background:var(--accent2);border-color:var(--accent);color:#fff}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem}
.pcard{
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:1.25rem;position:relative;overflow:hidden;transition:border-color .15s;
}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--border)}
.pcard.over::before{background:var(--green)}
.pcard.under::before{background:var(--red)}
.pcard:hover{border-color:var(--border2)}
.pcard-id{font-family:var(--fh);font-size:1.25rem;letter-spacing:.04em;margin-bottom:.9rem}
.hand-badge{font-size:.62rem;font-family:var(--fm);color:var(--dim);background:var(--bg2);padding:.12rem .38rem;border-radius:3px;margin-left:.5rem}
.pnums{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.9rem}
.pnum-label{font-size:.58rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.2rem}
.pnum-val{font-family:var(--fm);font-size:1.35rem;font-weight:500}
.pnum-val.line{color:var(--dim)}
.pnum-val.pred{color:var(--accent)}
.pnum-val.ep{color:var(--green)}.pnum-val.en{color:var(--red)}
.bet{display:flex;align-items:center;justify-content:space-between;padding:.55rem .7rem;border-radius:5px;font-size:.72rem;font-weight:600}
.bet.over{background:var(--green-dim);color:var(--green)}
.bet.under{background:var(--red-dim);color:var(--red)}
.bet.neutral{background:var(--bg2);color:var(--dim)}
.bet-odds{font-family:var(--fm);font-size:.75rem}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1.5rem}
.card-title{font-family:var(--fh);font-size:1rem;letter-spacing:.08em;color:var(--dim);margin-bottom:1rem}

.bar-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.45rem}
.bar-label{width:140px;font-size:.72rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.bar-fill.b{background:linear-gradient(90deg,var(--accent2),var(--accent))}
.bar-fill.g{background:var(--green)}.bar-fill.r{background:var(--red)}
.bar-val{width:52px;text-align:right;font-family:var(--fm);font-size:.68rem;color:var(--dim);flex-shrink:0}

.sh{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.25rem}
.sh-title{font-family:var(--fh);font-size:1.4rem;letter-spacing:.06em}
.sh-sub{font-size:.7rem;color:var(--muted);font-family:var(--fm)}

.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem}
thead th{padding:.55rem .7rem;text-align:left;font-size:.58rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);cursor:pointer}
thead th:hover{color:var(--text)}
thead th.r{text-align:right}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--bg3)}
tbody td{padding:.6rem .7rem;font-family:var(--fm);font-size:.75rem}
tbody td.r{text-align:right}
tbody td.name{font-family:var(--fb);font-weight:500}

.empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:1rem}
.empty-title{font-family:var(--fh);font-size:1.4rem;letter-spacing:.08em;margin-bottom:.5rem;color:var(--dim)}
.empty-sub{font-size:.78rem;line-height:1.7;color:var(--muted)}
.empty-sub code{background:var(--bg3);padding:.1rem .35rem;border-radius:3px;color:var(--text);font-family:var(--fm);font-size:.72rem}

.loading{display:flex;align-items:center;justify-content:center;height:180px;color:var(--muted);font-family:var(--fm);font-size:.78rem}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}
.dg{background:var(--green)}.dr{background:var(--red)}

@media(max-width:900px){.two-col{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="header">
  <div class="logo">FOOTS <span>ANALYTICS</span></div>
  <div class="meta">Strikeouts Dashboard · MLB K Prop Model<br>GBM + NegBinom · 1.74 MAE · 65.5% CV OU Acc</div>
</header>

<nav class="nav">
  <button class="tab active" onclick="showTab('predictions',this)">Predictions</button>
  <button class="tab" onclick="showTab('stuff',this)">Stuff Grades</button>
  <button class="tab" onclick="showTab('accuracy',this)">Accuracy</button>
  <button class="tab" onclick="showTab('parks',this)">Park Factors</button>
</nav>

<main class="main">
  <div id="predictions" class="panel active"><div class="loading">Loading predictions...</div></div>
  <div id="stuff"       class="panel"><div class="loading">Loading stuff grades...</div></div>
  <div id="accuracy"    class="panel"><div class="loading">Loading accuracy data...</div></div>
  <div id="parks"       class="panel"><div class="loading">Loading park factors...</div></div>
</main>

<script>
// ── Utilities ──────────────────────────────────────────────────
const fmt1  = v => v != null ? (+v).toFixed(1) : '—';
const fmt2  = v => v != null ? (+v).toFixed(2) : '—';
const fmt3  = v => v != null ? (+v).toFixed(3) : '—';
const fmtP  = v => v != null ? ((+v)*100).toFixed(1)+'%' : '—';
const fmtO  = v => v != null ? (v > 0 ? '+'+v : ''+v) : '—';
const esc   = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function load(path) {
  try {
    const r = await fetch(path + '?t=' + Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

// ── Tab switching ──────────────────────────────────────────────
const loaded = {};
function showTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if (!loaded[id]) { loaded[id] = true; renderTab(id); }
}

async function renderTab(id) {
  if (id === 'predictions') await renderPredictions();
  if (id === 'stuff')       await renderStuff();
  if (id === 'accuracy')    await renderAccuracy();
  if (id === 'parks')       await renderParks();
}

// ── Predictions ────────────────────────────────────────────────
let predFilter = 'ALL';
let bookFilter = 'ALL';
let predData = null;
let accDataForPreds = null;

async function renderPredictions() {
  [predData, accDataForPreds] = await Promise.all([
    load('data/predictions.json'),
    load('data/accuracy.json'),
  ]);
  drawPredictions();
}

function confidenceTierCard(accInfo) {
  const BREAKEVEN = 0.524;
  const tiers = accInfo?.by_confidence || [];

  if (!tiers.length) {
    return `<div class="card" style="margin-bottom:1.5rem;border-color:var(--gold);opacity:.5">
      <div class="card-title" style="color:var(--gold)">Model Confidence Tiers</div>
      <div style="font-size:.75rem;color:var(--muted)">Builds after games are scored. Run <code>log_results.py</code> daily.</div>
    </div>`;
  }

  // Aggregate both directions into one tier row for the summary bars
  const tierOrder = ['>=70%','65-70%','60-65%','55-60%','<55%'];
  const tierMap = {};
  tiers.forEach(r => {
    if (!tierMap[r.confidence_tier]) tierMap[r.confidence_tier] = {bets:0, correct:0};
    tierMap[r.confidence_tier].bets    += r.bets;
    tierMap[r.confidence_tier].correct += r.correct_bets;
  });

  // Over/Under split rows for detail columns
  const overTiers  = Object.fromEntries(tiers.filter(r=>r.direction==='OVER').map(r=>[r.confidence_tier,r]));
  const underTiers = Object.fromEntries(tiers.filter(r=>r.direction==='UNDER').map(r=>[r.confidence_tier,r]));

  const rows = tierOrder.map(tier => {
    const t  = tierMap[tier];
    if (!t) return '';
    const acc   = t.bets > 0 ? t.correct / t.bets : 0;
    const ov    = overTiers[tier];
    const un    = underTiers[tier];
    const color = acc >= BREAKEVEN ? 'var(--green)' : acc < 0.48 ? 'var(--red)' : 'var(--text)';
    const flag  = acc >= BREAKEVEN && t.bets >= 5 ? ' ✓' : t.bets < 5 ? ' *' : '';
    const ovAcc  = ov  ? fmtP(ov.accuracy)  + ` <span style="color:var(--muted)">(${ov.bets}x)</span>`  : '<span style="color:var(--muted)">—</span>';
    const unAcc  = un  ? fmtP(un.accuracy)  + ` <span style="color:var(--muted)">(${un.bets}x)</span>`  : '<span style="color:var(--muted)">—</span>';
    return `<div class="bar-row" style="margin-bottom:.55rem">
      <div class="bar-label" style="width:72px;font-size:.7rem">${tier}</div>
      <div style="font-family:var(--fm);font-size:.68rem;color:var(--dim);width:36px">${t.bets}x</div>
      <div class="bar-track"><div class="bar-fill ${acc>=BREAKEVEN?'g':'r'}" style="width:${Math.min(100,(acc*100)).toFixed(0)}%"></div></div>
      <div class="bar-val" style="color:${color};width:54px">${fmtP(acc)}${flag}</div>
      <div style="display:flex;gap:1.5rem;margin-left:.75rem;font-family:var(--fm);font-size:.68rem">
        <span style="color:var(--green)">${ovAcc}</span>
        <span style="color:var(--red)">${unAcc}</span>
      </div>
    </div>`;
  }).join('');

  const bestTier = tierOrder.find(t => {
    const d = tierMap[t];
    return d && d.bets >= 5 && (d.correct/d.bets) >= BREAKEVEN;
  });

  return `<div class="card" style="margin-bottom:1.5rem;border-color:var(--gold)">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1rem">
      <div class="card-title" style="color:var(--gold);margin-bottom:0">Model Confidence Tiers
        <span style="font-size:.6rem;color:var(--muted);font-family:var(--fm);font-weight:400"> · NegBinom P(Win) · ✓ profitable · * &lt;5 bets</span>
      </div>
      <div style="display:flex;gap:1.5rem;font-size:.6rem;font-weight:600;letter-spacing:.1em">
        <span style="color:var(--green)">OVER</span>
        <span style="color:var(--red)">UNDER</span>
      </div>
    </div>
    ${rows}
    <div style="font-size:.65rem;color:var(--dim);margin-top:.6rem;border-top:1px solid var(--border);padding-top:.6rem">
      ${bestTier
        ? `Recommended min: <strong style="color:var(--green)">${bestTier}</strong> confidence · ${fmtP(tierMap[bestTier].correct/tierMap[bestTier].bets)} on ${tierMap[bestTier].bets} bets`
        : 'Threshold guidance builds as predictions accumulate'}
      · <span style="color:var(--muted)">${accInfo?.summary?.dedup_total||0} pitcher-games scored</span>
    </div>
  </div>`;
}

function drawPredictions() {
  const el = document.getElementById('predictions');
  if (!predData) {
    el.innerHTML = empty('No Data', 'Run <code>generate_data.py</code> to populate.');
    return;
  }
  const all = predData.predictions || [];

  // Get unique books for filter
  const books = ['ALL', ...new Set(all.map(p => p.book).filter(Boolean))].sort((a,b) => {
    if (a === 'ALL') return -1;
    if (b === 'ALL') return 1;
    // Put DraftKings first after ALL
    if (a === 'draftkings') return -1;
    if (b === 'draftkings') return 1;
    return a.localeCompare(b);
  });

  // Apply filters
  let preds = bookFilter === 'ALL' ? all : all.filter(p => p.book === bookFilter);
  const filtered = predFilter === 'ALL'   ? preds
    : predFilter === 'EDGE'  ? preds.filter(p => p.flagged)
    : predFilter === 'OVER'  ? preds.filter(p => p.flagged && p.direction === 'OVER')
    : preds.filter(p => p.flagged && p.direction === 'UNDER');

  const edges  = preds.filter(p => p.flagged);
  const overs  = edges.filter(p => p.direction === 'OVER').length;
  const unders = edges.filter(p => p.direction === 'UNDER').length;

  const cards = filtered.length === 0
    ? empty('No Predictions', predFilter === 'ALL'
        ? 'Run <code>predict_today.py</code> then <code>generate_data.py</code> to populate.'
        : 'No predictions match this filter.')
    : `<div class="grid">${filtered.map(predCard).join('')}</div>`;

  el.innerHTML = `
    <div class="stats-row">
      <div class="stat"><div class="stat-label">Lines</div><div class="stat-val a">${preds.length}</div></div>
      <div class="stat"><div class="stat-label">+EV Bets</div><div class="stat-val gold">${edges.length}</div></div>
      <div class="stat"><div class="stat-label">+EV Overs</div><div class="stat-val g">${overs}</div></div>
      <div class="stat"><div class="stat-label">+EV Unders</div><div class="stat-val r">${unders}</div></div>
      <div class="stat"><div class="stat-label">Date</div><div class="stat-val" style="font-size:.9rem;color:var(--dim)">${predData.date||'—'}</div></div>
    </div>

    ${confidenceTierCard(accDataForPreds)}

    <div style="margin-bottom:.5rem;font-size:.6rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)">Sportsbook</div>
    <div class="filter-row" style="margin-bottom:1rem">
      ${books.map(b =>
        `<button class="fbtn ${bookFilter===b?'active':''}" onclick="setBookFilter('${b}')">${b==='ALL'?'All Books':b}</button>`
      ).join('')}
    </div>

    <div style="margin-bottom:.5rem;font-size:.6rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)">Direction</div>
    <div class="filter-row">
      ${['ALL','EDGE','OVER','UNDER'].map(f =>
        `<button class="fbtn ${predFilter===f?'active':''}" onclick="setPredFilter('${f}')">${f}</button>`
      ).join('')}
    </div>
    ${cards}`;
}

function setPredFilter(f) { predFilter = f; drawPredictions(); }
function setBookFilter(b) { bookFilter = b; drawPredictions(); }

function predCard(p) {
  const name = p.pitcher_name || `ID ${p.pitcher_id}`;
  const team = p.pitcher_team && p.pitcher_team !== '—' ? ` · ${esc(p.pitcher_team)}` : '';
  const venue = p.venue && p.venue !== '—'
    ? `<div style="font-size:.62rem;color:var(--muted);margin-bottom:.6rem">📍 ${esc(p.venue)}</div>` : '';
  const updated = p.line_updated && p.line_updated !== '—'
    ? `<div style="font-size:.6rem;color:var(--muted);margin-top:.5rem">Line updated ${esc(p.line_updated)}</div>` : '';

  const overOdds  = p.over_odds  != null ? fmtO(p.over_odds)  : '—';
  const underOdds = p.under_odds != null ? fmtO(p.under_odds) : '—';
  const fairOver  = p.fair_odds_over  != null ? fmtO(p.fair_odds_over)  : '—';
  const fairUnder = p.fair_odds_under != null ? fmtO(p.fair_odds_under) : '—';

  // Best direction by EV (may differ from raw edge direction)
  const hasPricing = p.our_prob_over != null;
  const evO = p.ev_over  != null ? p.ev_over  * 100 : null;
  const evU = p.ev_under != null ? p.ev_under * 100 : null;
  const bestDir = hasPricing
    ? ((evO != null && evU != null) ? (evO >= evU ? 'OVER' : 'UNDER') : (p.direction || 'OVER'))
    : (p.direction || 'OVER');
  const bestEV   = bestDir === 'OVER' ? evO : evU;
  const bestEVStr = bestEV != null ? (bestEV >= 0 ? '+$' : '-$') + Math.abs(bestEV).toFixed(2) : null;

  // P(Win) for the recommended direction
  const pWin = hasPricing
    ? (bestDir === 'OVER' ? p.our_prob_over : p.our_prob_under)
    : null;
  const pWinCls = pWin != null ? (pWin >= 0.58 ? 'g' : pWin < 0.50 ? 'en' : '') : '';

  const cls = p.flagged ? (bestDir === 'OVER' ? 'over' : 'under') : '';

  // Prob edges
  const probEdgeOver  = p.prob_edge_over  != null ? (p.prob_edge_over  >= 0 ? '+' : '') + (p.prob_edge_over  * 100).toFixed(1) + '%' : '—';
  const probEdgeUnder = p.prob_edge_under != null ? (p.prob_edge_under >= 0 ? '+' : '') + (p.prob_edge_under * 100).toFixed(1) + '%' : '—';

  // Pricing grid
  const pricingBlock = hasPricing ? `
    <div style="background:var(--bg2);border-radius:5px;padding:.6rem .75rem;margin-bottom:.6rem">
      <div style="display:grid;grid-template-columns:auto 1fr 1fr 1fr;gap:.3rem .75rem;align-items:center">
        <div></div>
        <div style="font-size:.58rem;font-weight:600;letter-spacing:.1em;color:var(--green);text-align:center">OVER</div>
        <div style="font-size:.58rem;font-weight:600;letter-spacing:.1em;color:var(--red);text-align:center">UNDER</div>
        <div></div>

        <div style="font-size:.6rem;color:var(--muted)">Market</div>
        <div style="font-family:var(--fm);font-size:.78rem;color:var(--text);text-align:center">${overOdds}</div>
        <div style="font-family:var(--fm);font-size:.78rem;color:var(--text);text-align:center">${underOdds}</div>
        <div style="font-size:.58rem;color:var(--muted)">posted</div>

        <div style="font-size:.6rem;color:var(--muted)">Fair</div>
        <div style="font-family:var(--fm);font-size:.78rem;color:var(--accent);text-align:center">${fairOver}</div>
        <div style="font-family:var(--fm);font-size:.78rem;color:var(--accent);text-align:center">${fairUnder}</div>
        <div style="font-size:.58rem;color:var(--muted)">model</div>

        <div style="font-size:.6rem;color:var(--muted)">P(Win)</div>
        <div style="font-family:var(--fm);font-size:.78rem;color:${(p.prob_edge_over||0)>=0?'var(--green)':'var(--red)'};text-align:center">${fmtP(p.our_prob_over)}</div>
        <div style="font-family:var(--fm);font-size:.78rem;color:${(p.prob_edge_under||0)>=0?'var(--green)':'var(--red)'};text-align:center">${fmtP(p.our_prob_under)}</div>
        <div style="font-size:.58rem;color:var(--muted)">NegBinom</div>

        <div style="font-size:.6rem;color:var(--muted)">Edge</div>
        <div style="font-family:var(--fm);font-size:.78rem;color:${(p.prob_edge_over||0)>0?'var(--green)':'var(--red)'};text-align:center">${probEdgeOver}</div>
        <div style="font-family:var(--fm);font-size:.78rem;color:${(p.prob_edge_under||0)>0?'var(--green)':'var(--red)'};text-align:center">${probEdgeUnder}</div>
        <div style="font-size:.58rem;color:var(--muted)">vs implied</div>

        <div style="font-size:.6rem;color:var(--muted)">EV</div>
        <div style="font-family:var(--fm);font-size:.78rem;color:${(evO||0)>0?'var(--green)':'var(--red)'};text-align:center;font-weight:${(evO||0)>0?'600':'400'}">${evO!=null?(evO>=0?'+$':'-$')+Math.abs(evO).toFixed(2):'—'}</div>
        <div style="font-family:var(--fm);font-size:.78rem;color:${(evU||0)>0?'var(--green)':'var(--red)'};text-align:center;font-weight:${(evU||0)>0?'600':'400'}">${evU!=null?(evU>=0?'+$':'-$')+Math.abs(evU).toFixed(2):'—'}</div>
        <div style="font-size:.58rem;color:var(--muted)">per $100</div>
      </div>
    </div>` : '';

  // Bet banner
  const bet = p.flagged
    ? `<div class="bet ${bestDir.toLowerCase()}" style="gap:.5rem">
        <span><span class="dot ${bestDir==='OVER'?'dg':'dr'}"></span>${bestDir} ${fmt1(p.line)}</span>
        <span style="display:flex;align-items:center;gap:.6rem">
          ${bestEVStr ? `<span style="font-family:var(--fm);font-size:.72rem;font-weight:700">${bestEVStr}/100</span>` : ''}
          <span class="bet-odds">${bestDir==='OVER'?overOdds:underOdds}${p.book?' · '+esc(p.book):''}</span>
        </span>
       </div>`
    : `<div class="bet neutral">
        <span style="color:var(--muted)">No edge · ${esc(p.book||'')}</span>
        <span class="bet-odds" style="color:var(--muted)">${pWin!=null?fmtP(pWin)+' P(Win)':''}</span>
       </div>`;

  return `
    <div class="pcard ${cls}">
      <div class="pcard-id">${esc(name)}<span class="hand-badge">${p.pitcher_hand==='R'?'RHP':'LHP'}</span></div>
      <div style="font-size:.68rem;color:var(--dim);margin-bottom:.3rem">${esc(p.matchup||'—')}${team}</div>
      ${venue}
      <div class="pnums">
        <div><div class="pnum-label">Line</div><div class="pnum-val line">${fmt1(p.line)}</div></div>
        <div><div class="pnum-label">Model</div><div class="pnum-val pred">${p.predicted_ks!=null?(+p.predicted_ks).toFixed(2):'—'}</div></div>
        <div><div class="pnum-label">P(Win)</div><div class="pnum-val ${pWinCls}">${pWin!=null?fmtP(pWin):'—'}</div></div>
      </div>
      ${pricingBlock}
      ${bet}
      ${updated}
    </div>`;
}

// ── Stuff Grades ───────────────────────────────────────────────
let stuffSort = 'whiff_rate';
let stuffData = null;

async function renderStuff() {
  stuffData = await load('data/stuff_grades.json');
  drawStuff();
}

function drawStuff() {
  const el = document.getElementById('stuff');
  if (!stuffData || !(stuffData.pitchers||[]).length) {
    el.innerHTML = empty('No Stuff Data', 'Run <code>generate_data.py</code> to populate.');
    return;
  }
  const pitchers = [...stuffData.pitchers].sort((a,b) => (b[stuffSort]||0)-(a[stuffSort]||0));
  const byVelo   = [...stuffData.pitchers].sort((a,b) => (b.avg_velo||0)-(a.avg_velo||0));
  const maxW = Math.max(...pitchers.map(p=>p.whiff_rate||0));
  const maxV = Math.max(...byVelo.map(p=>p.avg_velo||0));

  const cols = [
    {k:'whiff_rate',l:'Whiff%'},{k:'avg_velo',l:'Velo'},
    {k:'avg_spin',l:'Spin'},{k:'avg_ivb',l:'IVB'},{k:'pitch_count',l:'Pitches'}
  ];

  el.innerHTML = `
    <div class="sh"><div class="sh-title">Fastball Stuff Grades</div><div class="sh-sub">${stuffData.season} season · min 50 pitches</div></div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">Whiff Rate Leaders</div>
        ${pitchers.slice(0,15).map(p=>`
          <div class="bar-row">
            <div class="bar-label">${esc(p.pitcher_name||'ID '+p.pitcher_id)}</div>
            <div class="bar-track"><div class="bar-fill b" style="width:${maxW?((p.whiff_rate||0)/maxW*100):0}%"></div></div>
            <div class="bar-val">${fmtP(p.whiff_rate)}</div>
          </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title">Velocity Leaders</div>
        ${byVelo.slice(0,15).map(p=>`
          <div class="bar-row">
            <div class="bar-label">${esc(p.pitcher_name||'ID '+p.pitcher_id)}</div>
            <div class="bar-track"><div class="bar-fill b" style="width:${maxV?((p.avg_velo||0)/maxV*100):0}%"></div></div>
            <div class="bar-val">${p.avg_velo?((+p.avg_velo).toFixed(1)):'—'}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Full Leaderboard</div>
      <div class="filter-row">
        ${cols.map(c=>`<button class="fbtn ${stuffSort===c.k?'active':''}" onclick="setStuffSort('${c.k}')">${c.l}</button>`).join('')}
      </div>
      <div class="tw"><table>
        <thead><tr>
          <th>#</th><th>Pitcher ID</th>
          <th class="r">Pitches</th><th class="r">Velo</th>
          <th class="r">Spin</th><th class="r">IVB</th><th class="r">Whiff%</th>
        </tr></thead>
        <tbody>
          ${pitchers.map((p,i)=>`<tr>
            <td style="color:var(--muted)">${i+1}</td>
            <td class="name">${esc(p.pitcher_name||'ID '+p.pitcher_id)}</td>
            <td class="r">${p.pitch_count?p.pitch_count.toLocaleString():'—'}</td>
            <td class="r">${p.avg_velo?((+p.avg_velo).toFixed(1)):'—'}</td>
            <td class="r">${p.avg_spin?Math.round(p.avg_spin):'—'}</td>
            <td class="r">${p.avg_ivb?((+p.avg_ivb).toFixed(1)):'—'}</td>
            <td class="r" style="color:${(p.whiff_rate||0)>.3?'var(--green)':'inherit'}">${fmtP(p.whiff_rate)}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>`;
}

function setStuffSort(k) { stuffSort = k; drawStuff(); }

// ── Accuracy ───────────────────────────────────────────────────
let accView = 'daily';

async function renderAccuracy() {
  const data = await load('data/accuracy.json');
  const el = document.getElementById('accuracy');
  if (!data || !data.summary.total_bets) {
    el.innerHTML = empty('Accuracy Builds Over Time',
      (data?.summary?.message || 'Run <code>log_results.py</code> after games finish to populate.'));
    return;
  }
  accTabData = data;
  drawAccuracy();
}

let accTabData = null;

function drawAccuracy() {
  const el = document.getElementById('accuracy');
  if (!accTabData) return;
  const s = accTabData.summary;

  const summaryHtml = `
    <div class="stats-row">
      <div class="stat"><div class="stat-label">Unique Games</div><div class="stat-val a">${s.dedup_total||s.total_bets}</div></div>
      <div class="stat"><div class="stat-label">Correct</div><div class="stat-val g">${s.dedup_correct||s.correct_bets}</div></div>
      <div class="stat"><div class="stat-label">OU Accuracy</div><div class="stat-val gold">${fmtP(s.dedup_accuracy||s.accuracy)}</div></div>
      <div class="stat"><div class="stat-label">Total Lines</div><div class="stat-val" style="color:var(--dim)">${s.total_bets}</div></div>
      <div class="stat"><div class="stat-label">Avg Edge</div><div class="stat-val">${fmt2(s.avg_edge)} Ks</div></div>
      <div class="stat"><div class="stat-label">Avg Line</div><div class="stat-val" style="color:var(--dim)">${fmt1(s.avg_line)}</div></div>
      <div class="stat"><div class="stat-label">Avg Predicted</div><div class="stat-val" style="color:var(--accent)">${fmt1(s.avg_predicted)}</div></div>
      <div class="stat"><div class="stat-label">Avg Actual</div><div class="stat-val" style="color:var(--green)">${fmt1(s.avg_actual)}</div></div>
      <div class="stat"><div class="stat-label">Breakeven</div><div class="stat-val" style="color:var(--muted)">52.4%</div></div>
    </div>`;

  const viewBtns = `
    <div class="filter-row" style="margin-bottom:1.5rem">
      <button class="fbtn ${accView==='daily'?'active':''}" onclick="setAccView('daily')">Daily Rollup</button>
      <button class="fbtn ${accView==='bets'?'active':''}" onclick="setAccView('bets')">Bet Detail</button>
      <button class="fbtn ${accView==='by_confidence'?'active':''}" onclick="setAccView('by_confidence')">By Confidence</button>
      <button class="fbtn ${accView==='by_book'?'active':''}" onclick="setAccView('by_book')">By Book</button>
    </div>`;

  let content = '';

  if (accView === 'daily') {
    const rows = (accTabData.daily || []).map(r => `<tr>
      <td>${r.pred_date}</td>
      <td class="r">${r.total_bets}</td>
      <td class="r">${r.correct_bets}</td>
      <td class="r" style="color:${(r.accuracy||0)>.524?'var(--green)':(r.accuracy||0)<.45?'var(--red)':'inherit'}">${fmtP(r.accuracy)}</td>
      <td class="r" style="color:var(--dim)">${fmt1(r.avg_line)}</td>
      <td class="r" style="color:var(--accent)">${fmt1(r.avg_predicted)}</td>
      <td class="r" style="color:var(--green)">${fmt1(r.avg_actual)}</td>
      <td class="r">${fmt2(r.avg_edge)}</td>
    </tr>`).join('');
    content = `<div class="card"><div class="card-title">Daily Rollup</div>
      <div class="tw"><table>
        <thead><tr>
          <th>Date</th><th class="r">Bets</th><th class="r">Correct</th>
          <th class="r">Accuracy</th><th class="r">Avg Line</th>
          <th class="r">Avg Pred</th><th class="r">Avg Actual</th><th class="r">Avg Edge</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div></div>`;

  } else if (accView === 'bets') {
    const rows = (accTabData.bets || []).map(r => {
      const correctColor = r.correct === 1 ? 'var(--green)' : r.correct === 0 ? 'var(--red)' : 'inherit';
      const correctStr   = r.correct === 1 ? '✓' : r.correct === 0 ? '✗' : '—';
      const odds = r.direction === 'OVER'
        ? (r.over_odds  != null ? fmtO(r.over_odds)  : '—')
        : (r.under_odds != null ? fmtO(r.under_odds) : '—');
      const confVal = r.confidence != null ? (+r.confidence * 100).toFixed(0) + '%' : '—';
      const confColor = r.confidence >= 0.65 ? 'var(--green)' : r.confidence >= 0.55 ? 'var(--text)' : 'var(--muted)';
      return `<tr>
        <td>${r.game_date}</td>
        <td class="name">${esc(r.pitcher_name)}</td>
        <td style="font-size:.68rem;color:var(--dim)">${esc(r.pitcher_team||'')}</td>
        <td style="font-size:.68rem;color:var(--dim)">${esc(r.book||'')}</td>
        <td class="r" style="color:var(--dim)">${fmt1(r.line)}</td>
        <td class="r" style="color:var(--accent)">${r.predicted!=null?(+r.predicted).toFixed(2):'—'}</td>
        <td class="r" style="color:var(--green)">${fmt1(r.actual)}</td>
        <td class="r" style="color:${r.direction==='OVER'?'var(--green)':'var(--red)'}">${r.direction||'—'}</td>
        <td class="r" style="font-family:var(--fm);font-size:.72rem">${odds}</td>
        <td class="r" style="font-family:var(--fm);color:${confColor}">${confVal}</td>
        <td class="r" style="color:${correctColor};font-weight:700">${correctStr}</td>
      </tr>`;
    }).join('');
    content = `<div class="card"><div class="card-title">Bet Detail (last 500)</div>
      <div class="tw"><table>
        <thead><tr>
          <th>Date</th><th>Pitcher</th><th>Team</th><th>Book</th>
          <th class="r">Line</th><th class="r">Pred</th><th class="r">Actual</th>
          <th class="r">Dir</th><th class="r">Odds</th><th class="r">P(Win)</th><th class="r">✓</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div></div>`;

  } else if (accView === 'by_confidence') {
    const BREAKEVEN = 0.524;
    const tiers = accTabData.by_confidence || [];
    const tierOrder = ['>=70%','65-70%','60-65%','55-60%','<55%'];
    const dirRows = (dir, color) => tierOrder.map(tier => {
      const r = tiers.find(t => t.confidence_tier === tier && t.direction === dir);
      if (!r) return `<tr><td>${tier}</td><td colspan="4" style="color:var(--muted);text-align:center">no data</td></tr>`;
      const acc = r.accuracy || 0;
      const aColor = acc >= BREAKEVEN ? 'var(--green)' : acc < 0.48 ? 'var(--red)' : 'inherit';
      return `<tr>
        <td style="font-family:var(--fm)">${tier}</td>
        <td class="r">${r.bets}</td>
        <td class="r">${r.correct_bets}</td>
        <td class="r" style="color:${aColor};font-weight:600">${fmtP(acc)}</td>
        <td class="r" style="color:var(--dim)">${fmtP(r.avg_confidence)}</td>
      </tr>`;
    }).join('');
    content = `
      <div class="two-col">
        <div class="card">
          <div class="card-title" style="color:var(--green)">OVER — by Confidence</div>
          <div class="tw"><table>
            <thead><tr><th>Tier</th><th class="r">Bets</th><th class="r">Correct</th><th class="r">Accuracy</th><th class="r">Avg P(Win)</th></tr></thead>
            <tbody>${dirRows('OVER','var(--green)')}</tbody>
          </table></div>
          <div style="font-size:.65rem;color:var(--muted);margin-top:.75rem">Breakeven at 52.4% · min EV threshold</div>
        </div>
        <div class="card">
          <div class="card-title" style="color:var(--red)">UNDER — by Confidence</div>
          <div class="tw"><table>
            <thead><tr><th>Tier</th><th class="r">Bets</th><th class="r">Correct</th><th class="r">Accuracy</th><th class="r">Avg P(Win)</th></tr></thead>
            <tbody>${dirRows('UNDER','var(--red)')}</tbody>
          </table></div>
          <div style="font-size:.65rem;color:var(--muted);margin-top:.75rem">Confidence = P(bet direction is correct) · NegBinom</div>
        </div>
      </div>`;

  } else if (accView === 'by_book') {
    const rows = (accTabData.by_book || []).map(r => `<tr>
      <td class="name">${esc(r.book)}</td>
      <td class="r">${r.total_bets}</td>
      <td class="r">${r.correct_bets}</td>
      <td class="r" style="color:${(r.accuracy||0)>.524?'var(--green)':(r.accuracy||0)<.45?'var(--red)':'inherit'};font-weight:600">${fmtP(r.accuracy)}</td>
      <td class="r">${fmt2(r.avg_edge)}</td>
      <td class="r" style="color:var(--dim)">${fmt2(r.avg_prediction_error)}</td>
    </tr>`).join('');
    content = `<div class="card"><div class="card-title">Accuracy by Sportsbook</div>
      <div class="tw"><table>
        <thead><tr>
          <th>Book</th><th class="r">Bets</th><th class="r">Correct</th>
          <th class="r">Accuracy</th><th class="r">Avg Edge</th><th class="r">Avg Error</th>
        </tr></thead>
        <tbody>${rows || '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:2rem">Need ≥5 bets per book</td></tr>'}</tbody>
      </table></div></div>`;
  }

  el.innerHTML = summaryHtml + viewBtns + content;
}

function setAccView(v) { accView = v; drawAccuracy(); }

// ── Park Factors ───────────────────────────────────────────────
async function renderParks() {
  const data = await load('data/park_factors.json');
  const el = document.getElementById('parks');
  if (!data || !(data.parks||[]).length) {
    el.innerHTML = empty('No Park Data', 'Run <code>generate_data.py</code> to populate.');
    return;
  }
  const maxSeason = Math.max(...data.parks.map(p=>p.season||0));
  const parks  = data.parks.filter(p=>p.season===maxSeason).sort((a,b)=>b.park_k_factor-a.park_k_factor);
  const maxF   = Math.max(...parks.map(p=>p.park_k_factor||0));
  const minF   = Math.min(...parks.map(p=>p.park_k_factor||0));
  const range  = maxF - minF || 1;

  el.innerHTML = `
    <div class="sh"><div class="sh-title">Park K Factors</div><div class="sh-sub">Strikeout rate vs league avg · &gt;1.0 = pitcher friendly</div></div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">Most K-Friendly</div>
        ${parks.slice(0,15).map(p=>`
          <div class="bar-row">
            <div class="bar-label">${esc(p.venue)}</div>
            <div class="bar-track"><div class="bar-fill g" style="width:${((p.park_k_factor-minF)/range*100).toFixed(1)}%"></div></div>
            <div class="bar-val" style="color:var(--green)">${fmt3(p.park_k_factor)}</div>
          </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title">Least K-Friendly</div>
        ${[...parks].reverse().slice(0,15).map(p=>`
          <div class="bar-row">
            <div class="bar-label">${esc(p.venue)}</div>
            <div class="bar-track"><div class="bar-fill r" style="width:${((maxF-p.park_k_factor)/range*100).toFixed(1)}%"></div></div>
            <div class="bar-val" style="color:var(--red)">${fmt3(p.park_k_factor)}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">All Parks — ${maxSeason}</div>
      <div class="tw"><table>
        <thead><tr>
          <th>Venue</th><th class="r">Total PA</th>
          <th class="r">K Rate</th><th class="r">Park Factor</th>
        </tr></thead>
        <tbody>
          ${parks.map(p=>`<tr>
            <td class="name">${esc(p.venue)}</td>
            <td class="r">${p.total_pa?(+p.total_pa).toLocaleString():'—'}</td>
            <td class="r">${fmtP(p.venue_k_rate)}</td>
            <td class="r" style="color:${(p.park_k_factor||1)>1.02?'var(--green)':(p.park_k_factor||1)<.98?'var(--red)':'inherit'};font-weight:600">${fmt3(p.park_k_factor)}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>`;
}

// ── Empty state helper ─────────────────────────────────────────
function empty(title, sub) {
  return `<div class="empty">
    <div class="empty-icon">⚾</div>
    <div class="empty-title">${title}</div>
    <div class="empty-sub">${sub}</div>
  </div>`;
}

loaded['predictions'] = true;
renderPredictions();
